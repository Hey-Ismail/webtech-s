<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Retro Student Portfolio</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <nav>
        <h2 class="logo">Ismail.dev</h2>

        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>

        <button id="theme-btn">🌙</button>
      </nav>
    </header>

    <main>
      <!-- HERO -->
      <section id="home" class="hero">
        <h1>Hi, I'm Ismail 👋</h1>

        <h2 id="typing-text"></h2>

        <p>
          A student learning web development and building aesthetic websites
          with clean design.
        </p>
      </section>

      <!-- PROJECTS -->
      <section id="projects">
        <h2>My Projects</h2>

        <div id="project-container" class="project-container"></div>
      </section>

      <!-- CONTACT -->
      <section id="contact">
        <h2>Contact Me</h2>

        <form id="contact-form">
          <input type="text" placeholder="Name" id="name" />

          <input type="email" placeholder="Email" id="email" />

          <input type="text" placeholder="Subject" id="subject" />

          <textarea placeholder="Message" id="message"></textarea>

          <button type="submit">Send Message</button>

          <p id="form-msg"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 Student Portfolio</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
